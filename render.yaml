  services:
    - type: web
      name: rag-backend

      runtime: python

      buildCommand: |
        apt-get update
        apt-get install -y \
          tesseract-ocr \
          ghostscript \
          libjpeg-dev \
          libpng-dev \
          zlib1g-dev
        pip install -r requirements.txt

      startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT