services:
  - type: web
    name: rag-backend
    runtime: python

    buildCommand: |
      apt-get update
      apt-get install -y \
        tesseract-ocr \
        ghostscript \
        libjpeg-dev \
        libpng-dev \
        zlib1g-dev

      which tesseract || true
      tesseract --version || true

      which gs || true
      gs --version || true

      pip install -r requirements.txt

      which ocrmypdf || true
      ocrmypdf --version || true

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
